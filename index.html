<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>Finance Suite</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icon.svg" type="image/svg+xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);

      --bg: #07070d;
      --bg2: #0d0d17;
      --surface: rgba(255,255,255,0.04);
      --surface2: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);

      --gold: #f0c040;
      --gold2: #ffd666;
      --gold-dim: rgba(240,192,64,0.15);
      --gold-glow: rgba(240,192,64,0.35);

      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.15);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.15);
      --blue: #60a5fa;
      --blue-dim: rgba(96,165,250,0.12);
      --purple: #a78bfa;

      --text: #f0f0f8;
      --text2: rgba(240,240,248,0.55);
      --text3: rgba(240,240,248,0.3);

      --radius: 20px;
      --radius-sm: 12px;
      --radius-xs: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    html, body {
      height: 100%; width: 100%; overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
      user-select: none;
    }

    #root {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }

    /* ── BG AMBIENCE ── */
    .bg-orb {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none;
      z-index: 0;
    }
    .bg-orb-1 { width: 60vw; height: 60vw; top: -15%; right: -20%; background: radial-gradient(circle, rgba(240,192,64,0.12), transparent 70%); }
    .bg-orb-2 { width: 50vw; height: 50vw; bottom: 10%; left: -15%; background: radial-gradient(circle, rgba(96,165,250,0.08), transparent 70%); }

    /* ── SCREENS ── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      z-index: 1;
      transform: translateX(100%);
      transition: transform 0.38s cubic-bezier(0.32, 0, 0.17, 1);
      overflow: hidden;
    }
    .screen.active { transform: translateX(0); }
    .screen.exit { transform: translateX(-30%); }
    .screen.launcher { transform: translateX(0); }

    /* ── SCROLLABLE ── */
    .scroll {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .scroll::-webkit-scrollbar { display: none; }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: transform 0.12s ease, background 0.15s ease;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0; border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .card:active { transform: scale(0.97); }
    .card.no-tap:active { transform: none; }

    /* ── TOPBAR ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 10px;
      flex-shrink: 0; z-index: 10;
    }

    /* ── LAUNCHER ── */
    #launcher {
      padding: 0 20px;
      gap: 0;
    }
    .launcher-hero {
      padding: 24px 0 20px;
      flex-shrink: 0;
    }
    .launcher-greeting {
      font-size: 13px; font-weight: 500;
      color: var(--text3); letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .launcher-title {
      font-size: 36px; font-weight: 800;
      line-height: 1.05; letter-spacing: -0.02em;
    }
    .launcher-title span {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .launcher-cards {
      display: flex; flex-direction: column; gap: 14px;
      padding: 10px 0 30px;
      flex: 1;
    }
    .module-card {
      padding: 22px 24px;
      cursor: pointer;
      border-radius: 24px;
      display: flex; align-items: center; gap: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: all 0.18s ease;
      position: relative; overflow: hidden;
    }
    .module-card:active { transform: scale(0.97); }
    .module-card::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
    }
    .module-card.gold { border-color: rgba(240,192,64,0.25); }
    .module-card.gold:active { background: rgba(240,192,64,0.06); }
    .module-card.blue { border-color: rgba(96,165,250,0.22); }
    .module-card.blue:active { background: rgba(96,165,250,0.05); }
    .module-icon {
      width: 54px; height: 54px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .module-icon.gold-icon { background: linear-gradient(135deg, rgba(240,192,64,0.2), rgba(255,214,102,0.1)); border: 1px solid rgba(240,192,64,0.3); }
    .module-icon.blue-icon { background: linear-gradient(135deg, rgba(96,165,250,0.18), rgba(167,139,250,0.1)); border: 1px solid rgba(96,165,250,0.25); }
    .module-info { flex: 1; }
    .module-name { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 3px; }
    .module-desc { font-size: 12px; color: var(--text2); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
    .module-arrow {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      color: var(--text2); flex-shrink: 0;
    }

    /* ── HEADER ── */
    .screen-header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px 12px;
      flex-shrink: 0; z-index: 10;
    }
    .back-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: all 0.15s ease;
    }
    .back-btn:active { transform: scale(0.9); background: var(--surface2); }
    .screen-title { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; flex: 1; }
    .header-action {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: all 0.15s ease;
    }
    .header-action:active { transform: scale(0.9); }

    /* ── WALLET ── */
    .balance-hero {
      margin: 0 20px 16px;
      padding: 24px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(240,192,64,0.12), rgba(255,214,102,0.06));
      border: 1px solid rgba(240,192,64,0.25);
      position: relative; overflow: hidden;
    }
    .balance-hero::before {
      content: '';
      position: absolute; top: -30%; right: -15%;
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(240,192,64,0.15), transparent 70%);
    }
    .balance-label { font-size: 11px; font-weight: 600; color: rgba(240,192,64,0.7); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .balance-amount {
      font-family: 'JetBrains Mono', monospace;
      font-size: 42px; font-weight: 600;
      color: var(--gold2); letter-spacing: -0.02em;
      line-height: 1;
    }
    .balance-amount .currency { font-size: 22px; vertical-align: top; margin-top: 6px; display: inline-block; opacity: 0.7; }
    .balance-sub { margin-top: 16px; display: flex; gap: 12px; }
    .balance-chip {
      flex: 1; background: rgba(255,255,255,0.06); border-radius: 12px;
      padding: 10px 12px; border: 1px solid rgba(255,255,255,0.08);
    }
    .balance-chip-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
    .balance-chip-val { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 500; }

    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px 14px;
    }
    .month-nav-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .month-nav-btn:active { transform: scale(0.88); }
    .month-nav-label { font-size: 14px; font-weight: 700; letter-spacing: 0.02em; }

    .stats-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 0 20px 16px;
    }
    .stat-card {
      padding: 16px;
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .stat-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 500; }
    .stat-val.income { color: var(--green); }
    .stat-val.expense { color: var(--red); }

    /* budget ring */
    .budget-wrap {
      display: flex; align-items: center; gap: 16px;
      padding: 0 20px 16px;
    }
    .budget-ring-wrap { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
    .budget-ring-wrap svg { width: 72px; height: 72px; transform: rotate(-90deg); }
    .budget-ring-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .budget-ring-pct { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
    .budget-ring-lbl { font-size: 8px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
    .budget-info { flex: 1; }
    .budget-info-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .budget-info-sub { font-size: 12px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }
    .budget-edit-btn {
      padding: 8px 16px; border-radius: 20px;
      background: var(--surface2); border: 1px solid var(--border2);
      font-size: 11px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
    }
    .budget-edit-btn:active { transform: scale(0.93); }

    /* CALENDAR */
    .calendar-wrap { padding: 0 20px 16px; }
    .cal-grid-wrap {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 14px;
      overflow: hidden;
    }
    .cal-days-header {
      display: grid; grid-template-columns: repeat(7,1fr);
      margin-bottom: 6px;
    }
    .cal-day-hdr { text-align: center; font-size: 10px; font-weight: 700; color: var(--text3); padding: 4px 0; text-transform: uppercase; letter-spacing: 0.05em; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-cell {
      aspect-ratio: 1; border-radius: 10px; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: var(--text2);
      transition: all 0.12s ease; position: relative;
      overflow: hidden;
    }
    .cal-cell:active { transform: scale(0.86); }
    .cal-cell.today { color: var(--gold); }
    .cal-cell.selected {
      background: var(--gold); color: #000;
      box-shadow: 0 0 16px var(--gold-glow);
    }
    .cal-cell .dot {
      position: absolute; bottom: 3px;
      display: flex; gap: 2px;
    }
    .cal-cell .dot span {
      width: 4px; height: 4px; border-radius: 50%;
    }
    .cal-cell .dot .di { background: var(--red); }
    .cal-cell .dot .di2 { background: var(--green); }
    .cal-cell.has-data { color: var(--text); }

    /* TRANSACTIONS */
    .section-title {
      padding: 4px 20px 10px;
      font-size: 11px; font-weight: 700;
      color: var(--text3); text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .tx-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 100px; }
    .tx-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; cursor: pointer;
      transition: all 0.12s ease;
      position: relative; overflow: hidden;
    }
    .tx-item:active { transform: scale(0.98); background: var(--surface2); }
    .tx-icon {
      width: 42px; height: 42px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .tx-icon.income-icon { background: var(--green-dim); }
    .tx-icon.expense-icon { background: var(--red-dim); }
    .tx-info { flex: 1; min-width: 0; }
    .tx-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .tx-meta { font-size: 11px; color: var(--text3); font-weight: 500; display: flex; gap: 6px; align-items: center; }
    .tx-tag {
      padding: 2px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .tx-tag.income { background: var(--green-dim); color: var(--green); }
    .tx-tag.expense { background: var(--red-dim); color: var(--red); }
    .tx-amount { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; flex-shrink: 0; }
    .tx-amount.income { color: var(--green); }
    .tx-amount.expense { color: var(--red); }
    .tx-del {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--red-dim); color: var(--red);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: all 0.12s ease;
    }
    .tx-del:active { transform: scale(0.85); }

    .empty-state {
      text-align: center; padding: 40px 20px;
      color: var(--text3);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
    .empty-state .empty-text { font-size: 14px; font-weight: 600; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 24px);
      right: 20px;
      width: 60px; height: 60px; border-radius: 20px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 100;
      box-shadow: 0 8px 32px rgba(240,192,64,0.4);
      transition: all 0.15s ease;
    }
    .fab:active { transform: scale(0.9); box-shadow: 0 4px 16px rgba(240,192,64,0.3); }
    .fab svg { color: #000; }

    /* ── RENT BOOK ── */
    .rent-summary {
      margin: 0 20px 16px;
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .rent-sum-card {
      padding: 16px 14px;
      background: var(--surface); border-radius: 18px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .rent-sum-card .rsv { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .rent-sum-card .rsl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }
    .rent-sum-card.warn .rsv { color: var(--gold); }
    .rent-sum-card.danger .rsv { color: var(--red); }
    .rent-sum-card.ok .rsv { color: var(--green); }

    .tenant-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
    .tenant-card {
      display: flex; align-items: center; gap: 14px;
      padding: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; cursor: pointer;
      transition: all 0.12s ease;
      position: relative; overflow: hidden;
    }
    .tenant-card:active { transform: scale(0.98); }
    .tenant-avatar {
      width: 46px; height: 46px; border-radius: 50%;
      background: linear-gradient(135deg, var(--surface2), rgba(240,192,64,0.15));
      border: 1px solid rgba(240,192,64,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: var(--gold);
      flex-shrink: 0;
    }
    .tenant-info { flex: 1; min-width: 0; }
    .tenant-name { font-size: 16px; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tenant-house { font-size: 12px; color: var(--text3); font-weight: 500; }
    .tenant-balance { text-align: right; flex-shrink: 0; }
    .tenant-balance .bal { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; }
    .tenant-balance .bal.due { color: var(--red); }
    .tenant-balance .bal.adv { color: var(--green); }
    .tenant-balance .bal.clear { color: var(--text3); }
    .tenant-del {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--red-dim); color: var(--red);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.12s ease;
    }
    .tenant-del:active { transform: scale(0.85); }

    /* ── RENT DETAILS ── */
    .tenant-hero {
      margin: 0 20px 16px;
      padding: 22px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(96,165,250,0.1), rgba(167,139,250,0.06));
      border: 1px solid rgba(96,165,250,0.2);
      position: relative; overflow: hidden;
    }
    .tenant-hero-name { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
    .tenant-hero-house { font-size: 12px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
    .tenant-hero-balance {
      font-family: 'JetBrains Mono', monospace;
      font-size: 38px; font-weight: 600;
      line-height: 1;
    }
    .tenant-hero-balance.due { color: var(--red); }
    .tenant-hero-balance.adv { color: var(--green); }
    .tenant-hero-balance.clear { color: var(--text2); }
    .tenant-hero-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 6px; }
    .tenant-hero-label.due { color: rgba(248,113,113,0.7); }
    .tenant-hero-label.adv { color: rgba(74,222,128,0.7); }
    .tenant-hero-label.clear { color: var(--text3); }
    .new-bill-btn {
      margin-top: 16px; padding: 13px;
      background: rgba(255,255,255,0.08); border: 1px solid var(--border2);
      border-radius: 14px; text-align: center;
      font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; cursor: pointer;
      transition: all 0.15s ease;
    }
    .new-bill-btn:active { transform: scale(0.97); background: rgba(255,255,255,0.12); }

    .deposit-badge {
      margin: 0 20px 14px;
      padding: 10px 16px;
      background: var(--surface); border-radius: 12px;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .deposit-badge .dl { font-size: 12px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; }
    .deposit-badge .dv { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: var(--purple); }

    .record-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
    .record-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; overflow: hidden;
    }
    .record-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px;
      cursor: pointer;
    }
    .record-header:active { background: var(--surface2); }
    .record-month { font-size: 15px; font-weight: 700; }
    .record-bill-total { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text2); margin-top: 2px; }
    .record-right { text-align: right; }
    .record-running-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
    .record-running { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; }
    .record-running.due { color: var(--red); }
    .record-running.adv { color: var(--green); }
    .record-running.clear { color: var(--text3); }

    .record-actions { display: flex; gap: 8px; }

    .record-action-btn.primary { background: var(--gold-dim); border-color: rgba(240,192,64,0.3); color: var(--gold); }

    /* ── MODAL/SHEET ── */
    .sheet-overlay {
      position: fixed; inset: 0; z-index: 200;

    /* Numeric input display */

    /* Category grid */

    .month-picker-label { font-size: 15px; font-weight: 700; }

    /* Date field */
    .date-field {
      display: flex; align-items: center; gap: 10px;

      background: var(--surface2); border: 1px solid var(--border);

    /* Animations */

    .anim-in { animation: fadeIn 0.2s ease forwards; }

    .screen-content { animation: slideUp 0.3s ease both; }

    /* No transactions */
    .no-tx {
      text-align: center; padding: 48px 20px 80px;
    }
    .no-tx-icon { font-size: 52px; opacity: 0.3; margin-bottom: 12px; }
    .no-tx-text { font-size: 14px; color: var(--text3); font-weight: 600; }
    .no-tx-hint { font-size: 12px; color: var(--text3); opacity: 0.6; margin-top: 4px; }

    /* snackbar */
    .snackbar {
      position: fixed; bottom: calc(var(--safe-bottom) + 90px); left: 20px; right: 20px;
      background: #1a1a24; border: 1px solid var(--border2);

    /* Tab bar */
    .tab-bar {
      display: flex; align-items: center; justify-content: space-around;

      transition: all 0.15s ease;
    }
    .tab-item.active .tab-icon { color: var(--gold); }
    .tab-item.active .tab-lbl { color: var(--gold); }
    .tab-icon { color: var(--text3); transition: color 0.15s ease; }
    .tab-lbl { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; transition: color 0.15s ease; }

    /* Settings */
    .settings-wrap { padding: 0 20px 80px; }
    .settings-section { margin-bottom: 24px; }
    .settings-section-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; padding-left: 4px; }
    .settings-card {

    .settings-row:last-child { border-bottom: none; }

    .settings-row-info { flex: 1; }
    .settings-row-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .settings-row-sub { font-size: 12px; color: var(--text3); }

    /* Theme toggle */
    .theme-toggle {
      display: flex; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 4px; overflow: hidden;
    }
    .theme-opt {
      flex: 1; padding: 10px; border-radius: 10px;

      cursor: pointer; transition: all 0.15s ease; color: var(--text3);

    .theme-opt.active { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(240,192,64,0.3); }

    body.theme-minimal {
      --bg: #f5f4f0;
      --bg2: #ededea;
      --surface: rgba(0,0,0,0.04);
      --surface2: rgba(0,0,0,0.07);

      --border2: rgba(0,0,0,0.16);

  </style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div id="root">

  <div id="screen-launcher" class="screen launcher" style="padding:0"></div>
  <div id="screen-wallet" class="screen" style="padding:0"></div>

<!-- SHEET OVERLAY -->

      <div class="sheet-title" id="sheet-title">Add</div>
      <div class="sheet-close" onclick="closeSheet()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="confirm-btn cancel" onclick="closeConfirm()">Cancel</div>

    </div>
  </div>

<!-- SNACKBAR -->

<script>
// ╔══════════════════════════════════════╗
// ║         FINANCE SUITE v3             ║
// ║    Complete Rebuilt from scratch     ║
// ╚══════════════════════════════════════╝

const VER = 'fs3_';
const store = {
  get: (k, def) => {
    try {
      const v = localStorage.getItem(VER + k);
      return v ? JSON.parse(v) : def;
    } catch { return def; }
  },
  set: (k, v) => {
    try { localStorage.setItem(VER + k, JSON.stringify(v)); } catch {}
  }
};

// Migrate old data
function migrateOldData() {
  const oldTxs = localStorage.getItem('v50_walletTxs');
  const oldFunds = localStorage.getItem('v50_walletFunds');
  const oldTenants = localStorage.getItem('v50_rentTracker');
  if (oldTxs && !localStorage.getItem(VER + 'txs')) {
    try {
      const p = JSON.parse(oldTxs);
      const d = p?.d || p;
      if (Array.isArray(d)) store.set('txs', d);
    } catch {}
  }
  if (oldFunds && !localStorage.getItem(VER + 'funds')) {
    try {
      const p = JSON.parse(oldFunds);
      const d = p?.d || p;
      if (Array.isArray(d)) store.set('funds', d);
    } catch {}
  }
  if (oldTenants && !localStorage.getItem(VER + 'tenants')) {
    try {
      const p = JSON.parse(oldTenants);
      const d = p?.d || p;
      if (Array.isArray(d)) store.set('tenants', d);
    } catch {}
  }
}
migrateOldData();

// ── State ──
let state = {
  txs: store.get('txs', []),
  funds: store.get('funds', []),
  tenants: store.get('tenants', []),
  budget: store.get('budget', 5000),
  currentScreen: 'launcher',
  walletMonth: getMonthKey(new Date()),
  walletSelDate: getLocalISO(),
  activeTab: 'calendar', // calendar | list
  selTenantId: null,
  expandedRecords: {},
  pendingDelete: null,
  sheetMode: null,
  sheetData: {},
  activeInput: null,
  caps: false,
  theme: store.get('theme', 'dark'),
};

function save() {
  store.set('txs', state.txs);
  store.set('funds', state.funds);
  store.set('tenants', state.tenants);
  store.set('budget', state.budget);
}

// ── Helpers ──
function getLocalISO() {
  const d = new Date();
  const off = d.getTimezoneOffset() * 60000;
  return new Date(d.getTime() - off).toISOString().slice(0, 10);
}
function getMonthKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function parseISO(iso) {
  if (!iso) return new Date();
  const [y, m, d] = iso.split('-');
  return new Date(parseInt(y), parseInt(m)-1, parseInt(d));
}
function fmt(iso) {
  return parseISO(iso).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
}
function fmtMonth(iso) {
  const d = parseISO(iso + '-01');
  return d.toLocaleString('default', { month: 'long', year: 'numeric' });
}
function sf(v) {
  const n = parseFloat(v);
  return isNaN(n) ? 0 : Math.round(n * 100) / 100;
}
function fmtINR(v) { return '₹' + sf(v).toLocaleString('en-IN'); }
function uid() { return Date.now(); }

const CATS = [
  { id:'veg', e:'🥦', l:'Veg' },
  { id:'grocery', e:'🛒', l:'Groc' },
  { id:'med', e:'💊', l:'Med' },
  { id:'petrol', e:'⛽', l:'Fuel' },
  { id:'shop', e:'🛍️', l:'Shop' },
  { id:'house', e:'🏠', l:'Home' },
  { id:'food', e:'🍱', l:'Food' },
  { id:'elec', e:'⚡', l:'Elec' },
  { id:'travel', e:'🚗', l:'Travel' },
  { id:'ent', e:'🎬', l:'Fun' },
  { id:'other', e:'📦', l:'Other' },
];

// ── Computed ──
function walletStats() {
  const m = state.walletMonth;
  const allInc = state.funds.reduce((a,b) => a + sf(b.amount), 0);
  const allExp = state.txs.reduce((a,b) => a + sf(b.amount), 0);
  const totalBal = sf(allInc - allExp);
  const cashInc = state.funds.filter(f => f.method === 'cash').reduce((a,b) => a + sf(b.amount), 0);
  const cashExp = state.txs.filter(t => t.method === 'cash').reduce((a,b) => a + sf(b.amount), 0);
  const onlineInc = state.funds.filter(f => f.method !== 'cash').reduce((a,b) => a + sf(b.amount), 0);
  const onlineExp = state.txs.filter(t => t.method !== 'cash').reduce((a,b) => a + sf(b.amount), 0);
  const cashBal = sf(cashInc - cashExp);
  const onlineBal = sf(onlineInc - onlineExp);

  const mInc = state.funds.filter(f => f.date.startsWith(m)).reduce((a,b) => a + sf(b.amount), 0);
  const mExp = state.txs.filter(t => t.date.startsWith(m)).reduce((a,b) => a + sf(b.amount), 0);

  const daily = {};
  state.txs.filter(t => t.date.startsWith(m)).forEach(t => {
    if (!daily[t.date]) daily[t.date] = { exp: 0, inc: 0 };
    daily[t.date].exp += sf(t.amount);
  });
  state.funds.filter(f => f.date.startsWith(m)).forEach(f => {
    if (!daily[f.date]) daily[f.date] = { exp: 0, inc: 0 };
    daily[f.date].inc += sf(f.amount);
  });

  const selEntries = [
    ...state.txs.filter(t => t.date === state.walletSelDate).map(t => ({ ...t, type: 'expense' })),
    ...state.funds.filter(f => f.date === state.walletSelDate).map(f => ({ ...f, type: 'income', cat: 'income', title: f.note || 'Income' }))
  ].sort((a,b) => b.id - a.id);

  return { totalBal, cashBal, onlineBal, mInc, mExp, daily, selEntries };
}

function tenantStats(t) {
  if (!t.records) return { balance: 0, records: [] };
  const sorted = [...t.records].sort((a,b) => a.monthISO.localeCompare(b.monthISO));
  let running = 0;
  const processed = sorted.map(r => {
    const opening = running;
    const billTotal = sf((r.rentAmount || 0) + (r.electricBill || 0));
    const paidTotal = (r.payments || []).reduce((a,p) => a + sf(p.amount), 0);
    running = sf(opening + billTotal - paidTotal);
    return { ...r, openingBalance: opening, billTotal, paidTotal, runningBalance: running };
  });
  return { balance: running, records: processed.reverse() };
}

// ── Navigation ──
function navTo(screen, pushState = true) {
  const prev = state.currentScreen;
  document.getElementById('screen-' + prev)?.classList.remove('active');
  if (prev !== 'launcher') document.getElementById('screen-' + prev)?.classList.add('exit');
  
  state.currentScreen = screen;
  const el = document.getElementById('screen-' + screen);
  el?.classList.remove('exit');
  el?.classList.add('active');
  
  setTimeout(() => {
    document.getElementById('screen-' + prev)?.classList.remove('exit');
  }, 400);

  renderScreen(screen);
  if (pushState) history.pushState({ screen }, '');
}

function navBack() {
  if (state.sheetMode) { closeSheet(); return; }
  if (state.pendingDelete) { closeConfirm(); return; }
  if (state.currentScreen === 'rent-detail') { navTo('rentbook'); return; }
  if (state.currentScreen !== 'launcher') { navTo('launcher'); return; }
}

window.addEventListener('popstate', () => navBack());

// ── Sheets ──
function openSheet(mode, data = {}) {
  state.sheetMode = mode;
  state.sheetData = data;
  state.activeInput = null;
  state.caps = false;
  renderSheet();
  document.getElementById('sheet-overlay').classList.add('open');
  history.pushState({ sheet: mode }, '');
}

function closeSheet() {
  state.sheetMode = null;
  state.sheetData = {};
  state.activeInput = null;
  document.getElementById('sheet-overlay').classList.remove('open');
}

function closeConfirm() {
  state.pendingDelete = null;
  document.getElementById('confirm-overlay').classList.remove('open');
}

function confirmDelete(type, id, extra = {}) {
  state.pendingDelete = { type, id, ...extra };
  document.getElementById('confirm-overlay').classList.add('open');
}

function doDelete() {
  const { type, id, pid, recId } = state.pendingDelete;
  if (type === 'tx') state.txs = state.txs.filter(t => t.id !== id);
  if (type === 'fund') state.funds = state.funds.filter(f => f.id !== id);
  if (type === 'tenant') {
    state.tenants = state.tenants.filter(t => t.id !== id);
    navTo('rentbook', false);
  }
  if (type === 'record') {
    const ti = state.tenants.findIndex(t => t.id === pid);
    if (ti !== -1) state.tenants[ti].records = state.tenants[ti].records.filter(r => r.id !== id);
  }
  if (type === 'payment') {
    const ti = state.tenants.findIndex(t => t.id === pid);
    if (ti !== -1) {
      const ri = state.tenants[ti].records.findIndex(r => r.id === recId);
      if (ri !== -1) state.tenants[ti].records[ri].payments = state.tenants[ti].records[ri].payments.filter(p => p.id !== id);
    }
  }
  save();
  closeConfirm();
  renderCurrentScreen();
  showSnack('Deleted');
}

function showSnack(msg) {
  const el = document.getElementById('snackbar');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

  const st = tenantStats(t);
  const balClass = st.balance > 0 ? 'due' : st.balance < 0 ? 'adv' : 'clear';
  const balText = st.balance > 0 ? `₹${Math.abs(st.balance).toLocaleString('en-IN')}` :
                  st.balance < 0 ? `₹${Math.abs(st.balance).toLocaleString('en-IN')}` : 'Settled';
  const balLabel = st.balance > 0 ? 'Due' : st.balance < 0 ? 'Advance' : 'All Clear';

  const records = st.records.map(r => {
    const isExp = state.expandedRecords[r.id];
    const rbc = r.runningBalance > 0 ? 'due' : r.runningBalance < 0 ? 'adv' : 'clear';
    const rbText = r.runningBalance > 0 ? `₹${Math.abs(r.runningBalance).toLocaleString('en-IN')}` :
                   r.runningBalance < 0 ? `-₹${Math.abs(r.runningBalance).toLocaleString('en-IN')}` : '0';

    const payments = r.payments && r.payments.length > 0 ? r.payments.map(p => `
      <div class="payment-item">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="font-size:16px">💳</div>
          <div>
            <div style="font-size:12px;font-weight:600;color:var(--green)">₹${sf(p.amount).toLocaleString('en-IN')}</div>
            <div style="font-size:11px;color:var(--text3)">${fmt(p.date)} · ${p.method || 'cash'}</div>
          </div>
        </div>
        <div class="payment-del" onclick="confirmDelete('payment',${p.id},{pid:${t.id},recId:${r.id}})">${icons.trash}</div>
      </div>
    `).join('') : `<div style="font-size:12px;color:var(--text3);padding:4px 0">No payments recorded</div>`;

    const expanded = isExp ? `
      <div class="record-body">
        <div class="record-row rent-row">
          <div class="record-row-label">${icons.home} Rent</div>
          <div class="record-row-val">₹${sf(r.rentAmount).toLocaleString('en-IN')}</div>
        </div>
        <div class="record-row elec-row">
          <div class="record-row-label">${icons.bolt} Electric</div>
          <div class="record-row-val" style="color:#facc15">
            ₹${sf(r.electricBill).toLocaleString('en-IN')}
            ${r.units > 0 ? `<div style="font-size:10px;color:var(--text3);font-weight:400">${r.prevReading}→${r.currReading} (${r.units}u)</div>` : ''}
          </div>
        </div>
        ${r.openingBalance !== 0 ? `
        <div class="record-row prev-row">
          <div class="record-row-label">Carried Forward</div>
          <div class="record-row-val" style="color:${r.openingBalance > 0 ? 'var(--red)' : 'var(--green)'}">
            ${r.openingBalance > 0 ? '+' : ''}₹${Math.abs(r.openingBalance).toLocaleString('en-IN')}
          </div>
        </div>` : ''}
        <div class="payments-section">
          <div class="payments-title">Payments</div>
          ${payments}
        </div>
        <div class="record-actions">
          <div class="record-action-btn danger" onclick="confirmDelete('record',${r.id},{pid:${t.id}})">Delete Bill</div>
          <div class="record-action-btn primary" onclick="openPaySheet(${t.id},${r.id},${sf(r.billTotal + r.openingBalance - r.paidTotal)})">+ Payment</div>
        </div>
      </div>
    ` : '';

    return `
      <div class="record-card">
        <div class="record-header" onclick="toggleRecord(${r.id})">
          <div>
            <div class="record-month">${r.month}</div>
            <div class="record-bill-total">Bill: ₹${sf(r.billTotal).toLocaleString('en-IN')}</div>
          </div>
          <div class="record-right">
            <div class="record-running-label">Balance</div>
            <div class="record-running ${rbc}">${rbText}</div>
          </div>
        </div>
        ${expanded}
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <div style="display:flex;flex-direction:column;height:100%;padding-top:calc(var(--safe-top)+0px)">
      <div class="screen-header">
        <div class="back-btn" onclick="navTo('rentbook')">${icons.back}</div>
        <div class="screen-title" style="font-size:18px">${t.name}</div>
        <div class="header-action" onclick="openSheet('editTenant',{id:${t.id}})">${icons.pencil}</div>
      </div>

      <div class="scroll" style="flex:1">
        <div class="tenant-hero">
          <div class="tenant-hero-name">${t.name}</div>
          <div class="tenant-hero-house">${t.houseNo || 'No house no.'} · Rent ₹${sf(t.baseRent).toLocaleString('en-IN')}/mo</div>
          <div class="tenant-hero-balance ${balClass}"><span style="font-size:20px;vertical-align:top;margin-top:5px;display:inline-block;opacity:0.6">₹</span>${parseInt(balText.replace('₹','').replace(',',''))}</div>
          <div class="tenant-hero-label ${balClass}">${balLabel}</div>
          <div class="new-bill-btn" onclick="openNewBillSheet(${t.id})">＋ New Bill</div>
        </div>

        <div class="deposit-badge">
          <div class="dl">Security Deposit</div>
          <div class="dv">₹${sf(t.securityDeposit || 0).toLocaleString('en-IN')}</div>
        </div>

        <div class="section-title">Billing History</div>
        ${records.length > 0 ? `<div class="record-list">${records}</div>` : `<div class="no-tx"><div class="no-tx-icon">📋</div><div class="no-tx-text">No bills yet</div></div>`}
      </div>
    </div>
  `;
}

function toggleRecord(id) {
  state.expandedRecords[id] = !state.expandedRecords[id];
  renderRentDetail();
}

function openPaySheet(tenantId, recId, pending) {
  openSheet('addPayment', { tenantId, recId, amount: pending > 0 ? String(pending) : '', date: getLocalISO(), method: 'cash' });
}

function openNewBillSheet(tenantId) {
  const t = state.tenants.find(t => t.id === tenantId);
  const lastRec = t.records && t.records.length > 0 ?
    [...t.records].sort((a,b) => b.monthISO.localeCompare(a.monthISO))[0] : null;
  openSheet('addBill', {
    tenantId,
    oldUnit: lastRec?.currReading || '',
    newUnit: '',
    manualBill: '',
    monthISO: getMonthKey(new Date()),
  });
}

// ── SHEET RENDERING ──
function renderSheet() {
  const body = document.getElementById('sheet-body');
  const footer = document.getElementById('sheet-footer');
  const title = document.getElementById('sheet-title');
  const mode = state.sheetMode;
  const d = state.sheetData;

  footer.innerHTML = '';

  if (mode === 'addTx' || mode === 'editTx') {
    title.textContent = mode === 'editTx' ? 'Edit Expense' : 'Add Expense';
    if (!d.amount) d.amount = '';
    if (!d.cat) d.cat = 'veg';
    if (!d.method) d.method = 'cash';
    if (!d.title) d.title = '';
    state.activeInput = state.activeInput || 'amount';

    const catGrid = CATS.map(c => `
      <div class="cat-btn ${d.cat === c.id ? 'selected' : ''}" onclick="sheetSetCat('${c.id}')">
        ${c.e}<div class="cat-lbl">${c.l}</div>
      </div>
    `).join('');

    const method = `
      <div class="method-toggle">
        <div class="method-btn ${d.method === 'cash' ? 'active' : ''}" onclick="sheetSetMethod('cash')">💵 Cash</div>
        <div class="method-btn ${d.method === 'online' ? 'active' : ''}" onclick="sheetSetMethod('online')">📱 Online</div>
      </div>
    `;

    body.innerHTML = `
      <div class="amount-display" onclick="sheetActivate('amount')">
        <div class="amt"><span class="curr">₹</span>${d.amount || '0'}${state.activeInput === 'amount' ? '<span class="cursor-blink"></span>' : ''}</div>
      </div>
      <div class="cat-grid">${catGrid}</div>
      ${method}
      <div class="field-wrap">
        <div class="field-label">Note (optional)</div>
        <div class="field-display ${state.activeInput === 'note' ? 'active-field' : ''} ${!d.title ? 'placeholder' : ''}" onclick="sheetActivate('note')">${d.title || 'What was this for?'}${state.activeInput === 'note' ? '<span class="cursor-blink"></span>' : ''}</div>
      </div>
    `;
    renderKeyboard(state.activeInput === 'note' ? 'text' : 'num');
    footer.innerHTML = `<button class="save-btn" onclick="saveTx()" ${!d.amount ? 'disabled' : ''}>Save Expense</button>`;

  } else if (mode === 'addFund' || mode === 'editFund') {
    title.textContent = d.id ? 'Edit Income' : 'Add Money';
    if (!d.amount) d.amount = '';
    if (!d.method) d.method = 'cash';
    if (!d.note) d.note = '';
    state.activeInput = state.activeInput || 'amount';

    const method = `
      <div class="method-toggle">
        <div class="method-btn ${d.method === 'cash' ? 'active' : ''}" onclick="sheetSetMethod('cash')">💵 Cash</div>
        <div class="method-btn ${d.method === 'online' ? 'active' : ''}" onclick="sheetSetMethod('online')">📱 Online</div>
      </div>
    `;
    body.innerHTML = `
      <div class="amount-display" onclick="sheetActivate('amount')">
        <div class="amt"><span class="curr">₹</span>${d.amount || '0'}${state.activeInput === 'amount' ? '<span class="cursor-blink"></span>' : ''}</div>
      </div>
      ${method}
      <div class="field-wrap">
        <div class="field-label">Source</div>
        <div class="field-display ${state.activeInput === 'note' ? 'active-field' : ''} ${!d.note ? 'placeholder' : ''}" onclick="sheetActivate('note')">${d.note || 'e.g. Salary, Freelance…'}${state.activeInput === 'note' ? '<span class="cursor-blink"></span>' : ''}</div>
      </div>
    `;
    renderKeyboard(state.activeInput === 'note' ? 'text' : 'num');
    footer.innerHTML = `<button class="save-btn" onclick="saveFund()" ${!d.amount ? 'disabled' : ''} style="background:linear-gradient(135deg,var(--green),#22c55e);color:#000">Save Income</button>`;

  } else if (mode === 'budget') {
    title.textContent = 'Set Budget';
    if (d.amount === undefined) d.amount = String(state.budget);
    state.activeInput = 'amount';
    body.innerHTML = `
      <div style="padding:10px 0 14px;text-align:center;font-size:14px;color:var(--text3)">Monthly spending limit</div>
      <div class="amount-display">
        <div class="amt"><span class="curr">₹</span>${d.amount || '0'}<span class="cursor-blink"></span></div>
      </div>
    `;
    renderKeyboard('num');
    footer.innerHTML = `<button class="save-btn" onclick="saveBudget()">Set Budget</button>`;

  } else if (mode === 'addTenant' || mode === 'editTenant') {
    const isEdit = mode === 'editTenant';
    title.textContent = isEdit ? 'Edit Property' : 'Add Tenant';
    if (isEdit && d.id) {
      const t = state.tenants.find(t => t.id === d.id);
      if (t) {
        d.name = d.name ?? t.name;
        d.houseNo = d.houseNo ?? (t.houseNo || '');
        d.rent = d.rent ?? String(t.baseRent || '');
        d.deposit = d.deposit ?? String(t.securityDeposit || '');
        d.rentDay = d.rentDay ?? String(t.rentDay || '1');
      }
    } else {
      d.name = d.name || '';
      d.houseNo = d.houseNo || '';
      d.rent = d.rent || '';
      d.deposit = d.deposit || '';
      d.rentDay = d.rentDay || '1';
    }
    state.activeInput = state.activeInput || 'name';

    body.innerHTML = `
      <div style="padding-top:6px">
        <div class="field-wrap">
          <div class="field-label">Tenant Name</div>
          <div class="field-display ${state.activeInput === 'name' ? 'active-field' : ''} ${!d.name ? 'placeholder' : ''}" onclick="sheetActivate('name')">${d.name || 'Full name'}${state.activeInput === 'name' ? '<span class="cursor-blink"></span>' : ''}</div>
        </div>
        <div class="field-row">
          <div class="field-wrap">
            <div class="field-label">House No.</div>
            <div class="field-display ${state.activeInput === 'houseNo' ? 'active-field' : ''} ${!d.houseNo ? 'placeholder' : ''}" onclick="sheetActivate('houseNo')">${d.houseNo || 'e.g. A-101'}${state.activeInput === 'houseNo' ? '<span class="cursor-blink"></span>' : ''}</div>
          </div>
          <div class="field-wrap">
            <div class="field-label">Due Day</div>
            <div class="field-display ${state.activeInput === 'rentDay' ? 'active-field' : ''} ${!d.rentDay ? 'placeholder' : ''}" onclick="sheetActivate('rentDay')">${d.rentDay || '1'}${state.activeInput === 'rentDay' ? '<span class="cursor-blink"></span>' : ''}</div>
          </div>
        </div>
        <div class="field-row">
          <div class="field-wrap">
            <div class="field-label">Monthly Rent</div>
            <div class="field-display ${state.activeInput === 'rent' ? 'active-field' : ''} ${!d.rent ? 'placeholder' : ''}" onclick="sheetActivate('rent')">${d.rent ? '₹'+d.rent : '₹ Amount'}${state.activeInput === 'rent' ? '<span class="cursor-blink"></span>' : ''}</div>
          </div>
          <div class="field-wrap">
            <div class="field-label">Deposit</div>
            <div class="field-display ${state.activeInput === 'deposit' ? 'active-field' : ''} ${!d.deposit ? 'placeholder' : ''}" onclick="sheetActivate('deposit')">${d.deposit ? '₹'+d.deposit : '₹ Amount'}${state.activeInput === 'deposit' ? '<span class="cursor-blink"></span>' : ''}</div>
          </div>
        </div>
      </div>
    `;
    const numericFields = ['rentDay','rent','deposit'];
    renderKeyboard(numericFields.includes(state.activeInput) ? 'num' : 'text');
    footer.innerHTML = `<button class="save-btn" onclick="saveTenant()" ${!d.name ? 'disabled' : ''}>${isEdit ? 'Update Tenant' : 'Add Tenant'}</button>`;

  } else if (mode === 'addBill') {
    title.textContent = 'New Bill';
    d.oldUnit = d.oldUnit ?? '';
    d.newUnit = d.newUnit ?? '';
    d.manualBill = d.manualBill ?? '';
    d.monthISO = d.monthISO || getMonthKey(new Date());
    state.activeInput = state.activeInput || 'newUnit';

    const [by, bm] = d.monthISO.split('-').map(Number);
    const prevM = () => {
      let nm = bm - 1, ny = by;
      if (nm < 1) { nm = 12; ny--; }
      state.sheetData.monthISO = `${ny}-${String(nm).padStart(2,'0')}`;
      renderSheet();
    };
    const nextM = () => {
      let nm = bm + 1, ny = by;
      if (nm > 12) { nm = 1; ny++; }
      state.sheetData.monthISO = `${ny}-${String(nm).padStart(2,'0')}`;
      renderSheet();
    };

    body.innerHTML = `
      <div style="padding-top:6px">
        <div class="month-picker">
          <div class="month-picker-btn" onclick="(${prevM})()">${icons.chevL}</div>
          <div class="month-picker-label">${fmtMonth(d.monthISO)}</div>
          <div class="month-picker-btn" onclick="(${nextM})()">${icons.chevR}</div>
        </div>
        <div class="field-row">
          <div class="field-wrap">
            <div class="field-label">Old Reading</div>
            <div class="field-display ${state.activeInput === 'oldUnit' ? 'active-field' : ''} ${!d.oldUnit ? 'placeholder' : ''}" onclick="sheetActivate('oldUnit')">${d.oldUnit || '0'}${state.activeInput === 'oldUnit' ? '<span class="cursor-blink"></span>' : ''}</div>
          </div>
          <div class="field-wrap">
            <div class="field-label">New Reading</div>
            <div class="field-display ${state.activeInput === 'newUnit' ? 'active-field' : ''} ${!d.newUnit ? 'placeholder' : ''}" onclick="sheetActivate('newUnit')">${d.newUnit || '0'}${state.activeInput === 'newUnit' ? '<span class="cursor-blink"></span>' : ''}</div>
          </div>
        </div>
        <div class="field-wrap">
          <div class="field-label">Manual Electric Bill (Optional)</div>
          <div class="field-display ${state.activeInput === 'manualBill' ? 'active-field' : ''} ${!d.manualBill ? 'placeholder' : ''}" onclick="sheetActivate('manualBill')">${d.manualBill ? '₹'+d.manualBill : 'Override auto-calc'}${state.activeInput === 'manualBill' ? '<span class="cursor-blink"></span>' : ''}</div>
        </div>
        ${d.newUnit ? `<div style="background:var(--gold-dim);border:1px solid rgba(240,192,64,0.2);border-radius:14px;padding:12px 16px;font-size:13px;color:var(--gold)">
          Estimated bill: ₹${sf((sf(d.newUnit) - sf(d.oldUnit)) * 8).toLocaleString('en-IN')} (auto) + ₹${t?.baseRent || 0} rent
        </div>` : ''}
      </div>
    `;
    renderKeyboard('num');
    footer.innerHTML = `<button class="save-btn" onclick="saveBill()">Generate Bill</button>`;

  } else if (mode === 'addPayment') {
    title.textContent = 'Record Payment';
    d.amount = d.amount !== undefined ? d.amount : '';
    d.method = d.method || 'cash';
    d.date = d.date || getLocalISO();
    state.activeInput = state.activeInput || 'amount';

    const method = `
      <div class="method-toggle">
        <div class="method-btn ${d.method === 'cash' ? 'active' : ''}" onclick="sheetSetMethod('cash')">💵 Cash</div>
        <div class="method-btn ${d.method === 'online' ? 'active' : ''}" onclick="sheetSetMethod('online')">📱 Online</div>
      </div>
    `;

    body.innerHTML = `
      <div class="amount-display" onclick="sheetActivate('amount')">
        <div class="amt"><span class="curr">₹</span>${d.amount || '0'}${state.activeInput === 'amount' ? '<span class="cursor-blink"></span>' : ''}</div>
      </div>
      ${method}
      <div class="date-field" onclick="sheetActivate('date')">
        ${icons.calendar}
        <div class="df-label">${fmt(d.date)}</div>
        <div class="df-change">Tap to change</div>
      </div>
    `;

    if (state.activeInput === 'date') {
      // Render mini calendar
      const [cy, cm] = (d.monthView || d.date.substring(0,7)).split('-').map(Number);
      const dInM = new Date(cy, cm, 0).getDate();
      const startDay = new Date(cy, cm-1, 1).getDay();
      const today = getLocalISO();
      let cells = '';
      for (let i = 0; i < startDay; i++) cells += `<div></div>`;
      for (let dd = 1; dd <= dInM; dd++) {
        const iso = `${cy}-${String(cm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
        let cls = 'cal-cell';
        if (iso === d.date) cls += ' selected';
        else if (iso === today) cls += ' today';
        cells += `<div class="${cls}" onclick="sheetPickDate('${iso}')">${dd}</div>`;
      }
      const prevC = () => {
        let nm = cm - 1, ny = cy;
        if (nm < 1) { nm = 12; ny--; }
        state.sheetData.monthView = `${ny}-${String(nm).padStart(2,'0')}`;
        renderSheet();
      };
      const nextC = () => {
        let nm = cm + 1, ny = cy;
        if (nm > 12) { nm = 1; ny++; }
        state.sheetData.monthView = `${ny}-${String(nm).padStart(2,'0')}`;
        renderSheet();
      };
      body.innerHTML += `
        <div class="mini-cal">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div style="font-size:14px;font-weight:700">${fmtMonth(d.monthView || d.date.substring(0,7))}</div>
            <div style="display:flex;gap:8px">
              <div class="month-nav-btn" onclick="(${prevC})()">${icons.chevL}</div>
              <div class="month-nav-btn" onclick="(${nextC})()">${icons.chevR}</div>
            </div>
          </div>
          <div class="cal-days-header">${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-day-hdr">${d}</div>`).join('')}</div>
          <div class="cal-grid">${cells}</div>
        </div>
      `;
    } else {
      renderKeyboard('num');
    }
    footer.innerHTML = `<button class="save-btn" onclick="savePayment()" ${!d.amount ? 'disabled' : ''} style="background:linear-gradient(135deg,var(--green),#22c55e);color:#000">Record Payment</button>`;
  }
}

function sheetPickDate(iso) {
  state.sheetData.date = iso;
  state.sheetData.monthView = iso.substring(0, 7);
  renderSheet();
}

function sheetActivate(field) {
  state.activeInput = field;
  renderSheet();
}

function sheetSetCat(id) {
  state.sheetData.cat = id;
  renderSheet();
}

function sheetSetMethod(m) {
  state.sheetData.method = m;
  renderSheet();
}

// Keyboard
function renderKeyboard(type) {
  const footer = document.getElementById('sheet-footer');
  const existingKb = document.getElementById('kb');
  if (existingKb) existingKb.remove();

  const kb = document.createElement('div');
  kb.id = 'kb';
  kb.style.padding = '0 0 8px';

  if (type === 'num') {
    const keys = ['1','2','3','4','5','6','7','8','9','.','0','⌫'];
    kb.innerHTML = `
      <div class="keyboard numpad">
        ${keys.map(k => `<div class="key" onclick="kbPress('${k}')">${k === '⌫' ? '⌫' : k}</div>`).join('')}
      </div>
    `;
  } else {
    const rows = [
      ['q','w','e','r','t','y','u','i','o','p'],
      ['a','s','d','f','g','h','j','k','l'],
      ['⇧','z','x','c','v','b','n','m','⌫'],
    ];
    kb.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:5px;padding:6px 0">
        ${rows.map((row,ri) => `
          <div class="key-row" style="justify-content:center">
            ${row.map(k => {
              let w = k === '⇧' || k === '⌫' ? 'flex:1.5' : 'flex:1';
              let cls = k === '⌫' ? 'key key-back-del' : k === '⇧' ? `key${state.caps ? ' shift active' : ' shift'}` : 'key';
              const show = (k === '⇧') ? (state.caps ? '⇧' : '⇧') : k === '⌫' ? '⌫' : (state.caps ? k.toUpperCase() : k);
              return `<div class="${cls}" style="${w};min-height:42px;font-size:${ri===0?'14px':'15px'}" onclick="kbPress('${k}')">${show}</div>`;
            }).join('')}
          </div>
        `).join('')}
        <div class="key-row">
          <div class="key" style="flex:1" onclick="kbPress('@')">@</div>
          <div class="key" style="flex:1" onclick="kbPress('123')" id="kb-num">123</div>
          <div class="key" style="flex:4" onclick="kbPress(' ')">space</div>
          <div class="key" style="flex:1" onclick="kbPress('.')">.</div>
          <div class="key" style="flex:1.5" onclick="kbReturn()">↵</div>
        </div>
      </div>
    `;
  }

  footer.parentNode.insertBefore(kb, footer);
}

function kbReturn() {
  // advance to next field or submit
}

function kbPress(k) {
  const d = state.sheetData;
  const field = state.activeInput;
  if (!field) return;

  if (k === '⌫') {
    if (field === 'amount' || field === 'budget' || (state.sheetMode === 'budget')) {
      const f = state.sheetMode === 'budget' ? 'amount' : field;
      d[f] = String(d[f] || '').slice(0, -1);
    } else if (field === 'amount') {
      d.amount = String(d.amount || '').slice(0, -1);
    } else {
      d[field] = String(d[field] || '').slice(0, -1);
    }
  } else if (k === '⇧') {
    state.caps = !state.caps;
  } else if (k === '123') {
    // not needed
  } else {
    const isNumField = ['amount','rent','deposit','rentDay','oldUnit','newUnit','manualBill'].includes(field) || state.sheetMode === 'budget';
    if (isNumField) {
      if (!/[0-9.]/.test(k)) return;
      const cur = String(d[field] || '');
      if (k === '.' && cur.includes('.')) return;
      d[field] = cur + k;
    } else {
      d[field] = String(d[field] || '') + (state.caps ? k.toUpperCase() : k);
      if (state.caps) state.caps = false;
    }
  }
  renderSheet();
}

// ── SAVE ACTIONS ──
function saveTx() {
  const d = state.sheetData;
  if (!d.amount) return;
  const cat = CATS.find(c => c.id === d.cat) || CATS[0];
  const tx = {
    id: d.id || uid(),
    amount: sf(d.amount),
    cat: d.cat || 'other',
    title: d.title || cat.l,
    date: state.walletSelDate,
    method: d.method || 'cash',
  };
  if (d.id) {
    state.txs = state.txs.map(t => t.id === d.id ? tx : t);
  } else {
    state.txs = [tx, ...state.txs].slice(0, 500);
  }
  save();
  closeSheet();
  renderWallet();
  showSnack(d.id ? 'Updated' : 'Expense added');
}

function saveFund() {
  const d = state.sheetData;
  if (!d.amount) return;
  const fund = {
    id: d.id || uid(),
    amount: sf(d.amount),
    note: d.note || 'Income',
    date: state.walletSelDate,
    method: d.method || 'cash',
  };
  if (d.id) {
    state.funds = state.funds.map(f => f.id === d.id ? fund : f);
  } else {
    state.funds = [fund, ...state.funds].slice(0, 500);
  }
  save();
  closeSheet();
  renderWallet();
  showSnack('Income added');
}

function saveBudget() {
  state.budget = sf(state.sheetData.amount) || 5000;
  save();
  closeSheet();
  renderWallet();
  showSnack('Budget updated');
}

function saveTenant() {
  const d = state.sheetData;
  if (!d.name || !d.name.trim()) return;
  const tenant = {
    id: d.id || uid(),
    name: d.name.trim(),
    houseNo: (d.houseNo || '').trim(),
    baseRent: sf(d.rent),
    securityDeposit: sf(d.deposit),
    rentDay: String(Math.max(1, Math.min(31, parseInt(d.rentDay) || 1))),
    records: [],
  };
  if (state.sheetMode === 'editTenant' && d.id) {
    const existing = state.tenants.find(t => t.id === d.id);
    if (existing) tenant.records = existing.records || [];
    state.tenants = state.tenants.map(t => t.id === d.id ? tenant : t);
  } else {
    state.tenants = [tenant, ...state.tenants];
  }
  save();
  closeSheet();
  renderRentBook();
  if (state.currentScreen === 'rent-detail') renderRentDetail();
  showSnack(state.sheetMode === 'editTenant' ? 'Updated' : 'Tenant added');
}

function saveBill() {
  const d = state.sheetData;
  const tId = d.tenantId;
  const ti = state.tenants.findIndex(t => t.id === tId);
  if (ti === -1) return;
  const t = state.tenants[ti];
  const prev = sf(d.oldUnit);
  const curr = sf(d.newUnit);
  const units = Math.max(0, curr - prev);
  const manual = d.manualBill === '' ? -1 : sf(d.manualBill);
  const elec = manual >= 0 ? manual : sf(units * 8);
  const rent = sf(t.baseRent || 0);
  const newRec = {
    id: uid(),
    monthISO: d.monthISO,
    month: fmtMonth(d.monthISO),
    prevReading: prev,
    currReading: curr,
    units,
    rentAmount: rent,
    electricBill: elec,
    totalBill: sf(rent + elec),
    payments: [],
  };
  const existIdx = (t.records || []).findIndex(r => r.monthISO === d.monthISO);
  let recs = [...(t.records || [])];
  if (existIdx !== -1) {
    recs[existIdx] = { ...newRec, id: recs[existIdx].id, payments: recs[existIdx].payments };
  } else {
    recs = [newRec, ...recs].slice(0, 100);
  }
  state.tenants[ti] = { ...t, records: recs };
  save();
  closeSheet();
  renderRentDetail();
  showSnack('Bill generated');
}

function savePayment() {
  const d = state.sheetData;
  if (!d.amount || sf(d.amount) <= 0) return;
  const { tenantId, recId } = d;
  const ti = state.tenants.findIndex(t => t.id === tenantId);
  if (ti === -1) return;
  const t = state.tenants[ti];
  const ri = t.records.findIndex(r => r.id === recId);
  if (ri === -1) return;
  const payment = { id: uid(), amount: sf(d.amount), date: d.date || getLocalISO(), method: d.method || 'cash' };
  const recs = [...t.records];
  recs[ri] = { ...recs[ri], payments: [...(recs[ri].payments || []), payment] };
  state.tenants[ti] = { ...t, records: recs };

  // Auto-sync to wallet as income
  const fund = { id: uid(), amount: sf(d.amount), note: `Rent: ${t.name}`, date: d.date || getLocalISO(), method: d.method || 'cash' };
  state.funds = [fund, ...state.funds].slice(0, 500);

  save();
  closeSheet();
  renderRentDetail();
  showSnack('Payment recorded');
}

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  // Apply saved theme
  if (state.theme === 'minimal') document.body.classList.add('theme-minimal');

  // Set up screens
  document.getElementById('screen-launcher').classList.add('active', 'launcher');
  
  renderLauncher();
  history.replaceState({ screen: 'launcher' }, '');

  // Tap outside sheet to close
  document.getElementById('sheet-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeSheet();
  });
  document.getElementById('confirm-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm();
  });
});
</script>
