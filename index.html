<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#07070e"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Finance Suite"/>
  <title>Finance Suite</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icon.svg" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="icon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<div class="atmo" aria-hidden="true"></div>

<div id="app">
  <div id="screen-home"       class="screen" data-state="active"></div>
  <div id="screen-wallet"     class="screen" data-state="hidden"></div>
  <div id="screen-rentbook"   class="screen" data-state="hidden"></div>
  <div id="screen-rentdetail" class="screen" data-state="hidden"></div>
  <div id="screen-settings"   class="screen" data-state="hidden"></div>
</div>

<!-- Sheet -->
<div id="sheet-backdrop" class="sheet-backdrop">
  <div id="sheet" class="sheet">
    <div class="sheet-pill"></div>
    <div class="sheet-hdr">
      <h2 class="sheet-title" id="sheet-title"></h2>
      <button class="sheet-close" id="sheet-close-btn">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="4" y1="4" x2="16" y2="16"/><line x1="16" y1="4" x2="4" y2="16"/>
        </svg>
      </button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
    <div class="sheet-foot" id="sheet-footer"></div>
  </div>
</div>

<!-- Dialog -->
<div id="dialog-backdrop" class="dlg-backdrop">
  <div class="dlg">
    <div class="dlg-ico" id="dlg-icon">🗑️</div>
    <h3 class="dlg-title" id="dlg-title">Are you sure?</h3>
    <p class="dlg-body" id="dlg-body"></p>
    <div class="dlg-btns">
      <button class="dlg-btn cancel" onclick="closeDialog()">Cancel</button>
      <button class="dlg-btn confirm" id="dlg-confirm" onclick="confirmDialog()">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast" aria-live="polite"></div>

<script src="js/app.js"></script>
<script src="js/wallet.js"></script>
<script src="js/rentbook.js"></script>
<script src="js/settings.js"></script>
<script>
(function boot() {
  document.getElementById('sheet-close-btn').addEventListener('click', closeSheet);
  document.getElementById('sheet-backdrop').addEventListener('click', function(e) {
    if (e.target === this) closeSheet();
  });
  document.getElementById('dialog-backdrop').addEventListener('click', function(e) {
    if (e.target === this) closeDialog();
  });

  APP.init();
  renderHome();
  history.replaceState({ screen: 'home' }, '');

  window.addEventListener('popstate', function() {
    if (UI.sheetOpen)  { closeSheet();  return; }
    if (UI.dialogOpen) { closeDialog(); return; }
    if (APP.currentScreen !== 'home') {
      const prev = APP.screenHistory.pop() || 'home';
      const fromEl = document.getElementById('screen-' + APP.currentScreen);
      const toEl   = document.getElementById('screen-' + prev);
      if (!fromEl || !toEl) return;
      APP.currentScreen = prev;
      renderScreen(prev);
      fromEl.dataset.state = 'exiting-right';
      toEl.dataset.state   = 'active';
      toEl.classList.add('from-left');
      setTimeout(() => { fromEl.dataset.state='hidden'; toEl.classList.remove('from-left'); }, 360);
    }
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
