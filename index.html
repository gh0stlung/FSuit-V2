<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#080810"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Finance Suite"/>
  <title>Finance Suite</title>

  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icon.svg" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="icon.svg"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<!-- Background atmosphere -->
<div class="atmo" aria-hidden="true"></div>
<div class="grain" aria-hidden="true"></div>

<!-- App root -->
<div id="app">

  <!-- ── Screens ── -->
  <div id="screen-home"       class="screen" data-state="active"></div>
  <div id="screen-wallet"     class="screen" data-state="hidden"></div>
  <div id="screen-rentbook"   class="screen" data-state="hidden"></div>
  <div id="screen-rentdetail" class="screen" data-state="hidden"></div>
  <div id="screen-settings"   class="screen" data-state="hidden"></div>

</div>

<!-- ── Bottom Sheet ── -->
<div id="sheet-backdrop" class="sheet-backdrop" onclick="handleBackdropClick(event)">
  <div id="sheet" class="sheet">
    <div class="sheet-pill"></div>
    <div class="sheet-header">
      <h2 class="sheet-title" id="sheet-title"></h2>
      <button class="icon-btn" id="sheet-close-btn" onclick="closeSheet()" style="width:32px;height:32px"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="16" y2="16"/><line x1="16" y1="4" x2="4" y2="16"/></svg></button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
    <div class="sheet-footer" id="sheet-footer"></div>
  </div>
</div>

<!-- ── Confirm Dialog ── -->
<div id="dialog-backdrop" class="dialog-backdrop" onclick="handleDialogBackdrop(event)">
  <div class="dialog">
    <div class="dialog-icon" id="dlg-icon">🗑️</div>
    <h3 class="dialog-title" id="dlg-title">Are you sure?</h3>
    <p class="dialog-body" id="dlg-body"></p>
    <div class="dialog-btns">
      <button class="btn btn-ghost" onclick="closeDialog()">Cancel</button>
      <button class="btn btn-danger" id="dlg-confirm" onclick="confirmDialog()">Delete</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast" class="toast" aria-live="polite"></div>

<!-- Scripts — order matters -->
<script src="js/app.js"></script>
<script src="js/wallet.js"></script>
<script src="js/rentbook.js"></script>
<script src="js/settings.js"></script>
<script>
/* ── Bootstrap ── */
(function boot() {
    '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="16" y2="16"/><line x1="16" y1="4" x2="4" y2="16"/></svg>';

  // Init app state
  APP.init();

  // Render home screen
  renderHome();

  // Browser back button
  window.addEventListener('popstate', () => {
    if (UI.sheetOpen)  { closeSheet();   return; }
    if (UI.dialogOpen) { closeDialog();  return; }
    if (APP.currentScreen !== 'home') {
      const prev = APP.screenHistory.pop() || 'home';
      const fromEl = document.getElementById(`screen-${APP.currentScreen}`);
      const toEl   = document.getElementById(`screen-${prev}`);
      if (fromEl && toEl) {
        APP.currentScreen = prev;
        renderScreen(prev);
        fromEl.dataset.state = 'exiting-right';
        toEl.dataset.state   = 'active';
        toEl.classList.add('from-left');
        setTimeout(() => {
          fromEl.dataset.state = 'hidden';
          toEl.classList.remove('from-left');
        }, 380);
      }
    }
  });

  history.replaceState({ screen: 'home' }, '');

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();

/* ── Sheet backdrop click (close only if clicking outside sheet) ── */
function handleBackdropClick(e) {
  if (e.target === document.getElementById('sheet-backdrop')) closeSheet();
}
function handleDialogBackdrop(e) {
  if (e.target === document.getElementById('dialog-backdrop')) closeDialog();
}
</script>
</body>
</html>
